name: Scrape Races

on:
  schedule:
    # Thu+Fri 18:00 MUT (UTC+4) = 14:00 UTC — cards typically published Thu/Fri
    - cron: "0 14 * * 4,5"
    # Sat+Sun 08:00 MUT (UTC+4) = 04:00 UTC — morning fallback
    - cron: "0 4 * * 6,0"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render server
        run: |
          echo "Pinging server to wake it up..."
          curl --silent --max-time 60 ${{ secrets.BACKEND_URL }}/api/users || true
          sleep 5

      - name: Scrape races from supertote.mu
        run: |
          echo "Triggering race scrape..."
          curl --fail --silent --show-error \
            --request POST \
            --max-time 120 \
            "${{ secrets.BACKEND_URL }}/api/races/scrape" \
            | tee /tmp/response.json
          echo ""
          cat /tmp/response.json
